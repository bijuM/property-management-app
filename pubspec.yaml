name: villabooks
description: A Flutter landlord finance app to track villas, tenants, rental income, and expenses.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  cloud_firestore: ^6.3.0
  collection: ^1.18.0
  connectivity_plus: 6.1.5
  csv: ^8.0.0
  cupertino_icons: ^1.0.2
  drift: ^2.13.0
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  freezed_annotation: ^2.4.1
  intl: ^0.19.0
  json_annotation: ^4.8.1
  path: ^1.8.3
  path_provider: ^2.1.0
  pdf: ^3.12.0
  printing: ^5.14.3
  riverpod_annotation: ^2.3.0
  share_plus: ^13.1.0
  shared_preferences: ^2.5.5
  sqlite3_flutter_libs: ^0.5.0
  uuid: ^4.0.0

dev_dependencies:
  build_runner: ^2.4.0
  drift_dev: ^2.13.0
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.4.1
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
