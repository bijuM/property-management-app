name: villabooks
description: A Flutter landlord finance app to track villas, tenants, rental income, and expenses.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Database
  drift: ^2.13.0
  sqlite3_flutter_libs: ^0.5.0
  
  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  collection: ^1.18.0
  path_provider: ^2.1.0
  path: ^1.8.3
  pdf: ^3.12.0
  printing: ^5.14.3
  csv: ^8.0.0
  share_plus: ^13.1.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  drift_dev: ^2.13.0
  freezed: ^2.4.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
